def generate_problems(n=10):
    problems = []

def create_problem_pdf(problems):
    pdf = FPDF()
    pdf.add_page()
    pdf.set_font("Arial", size=14)

    pdf.cell(0, 10, "Chemistry Worksheet", ln=True)

    pdf = FPDF()

    pdf.ln(5)
