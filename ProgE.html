<!DOCTYPE html>
<html>
<head>
    <title>ProgE.html</title>

<script src=
"https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">

</script>

<body>
  <p style="font-size: 50px;">
  ProgE.html<br><br>


  <p style="font-size: 25px;">
  Newton's Second Law quiz  generator<br>
  click on the button below to generate the QUIZE.PDF and KEYE.PDF
  <br><br>

<input type="button" value="Create PDF QUIZ and KEY files" onclick="doIt()" />

<script>

var i,j,k,l,m,prob,type;
var x,z,s,t,u,v,answer,s1,s2,s3,s4,s5,s6,s10,sx,sy,sz,sv;
var sq="\u00b2";


function doIt()
{
  const { jsPDF } = window.jspdf;

  const doc = new jsPDF();
  const dockey=new jsPDF();

  let vert = 30;


  // Title
  doc.setFontSize(16);
  doc.text("Name__________________ Number_________ QUIZE", 10, vert);
  dockey.text("KEYE",10,vert);

  vert += 10;

  doc.setFontSize(14);dockey.setFontSize(14);

// v is test version, so you can identify printed tests
  v=Math.ceil(Math.random()*10000) +1;
    console.log(v);
  sv=" "+v;
  s6=""+sv
  doc.text(s6,180,10);
  dockey.text(s6,180,10);

  for(prob=1;prob<=10;prob++)
  {
    newProb();

    s0=prob+" )  "+s2;
    s5=prob+" )  "+s4;
    doc.text(s0,20,vert); //doc.text(s1,40,vert);
    dockey.text(s5,20,vert);
    //dockey.text(s10,40,vert);
    vert+=10;//doc.text()
    doc.text(s3,48,vert)
    //dockey.text(s0,20,y);


    if(prob==5)
    {
      doc.addPage();dockey.addPage();
      vert = 5;
      doc.text(s6,180,10);
      dockey.text(s6,180,10);

    }
    vert+=35;
  }



// generates the PDF files for download...
  doc.save("QUIZE.PDF");
  dockey.save("KEYE.PDF");


} //end of doIt

function newProb()
{
  // x,y,z and sx,sy,sz;

  //type=Math.ceil(Math.random()*3); //2 types problems....
  type=prob%3;
  //type=1;
  y=Math.ceil(Math.random()*100)/10 +1;
  sy=y.toPrecision(3);
  z=Math.ceil(Math.random()*100)/10+1;
  sz=z.toPrecision(3);
  x=y*z;
  sx=x.toPrecision(3);

  //sv=v.toString(16);
  //s7="";

  switch(type)
  {
    case 1: // Force
    s2="________ Find the force of an object with mass "+sy+" kg";
    s3="   that accelerates at   "+sz+" m/s"+sq;
    s4=x.toPrecision(3)+ " N";

    //x=y/z;
    break;

    case 2: // mass
    s2="_______ Find the mass of an object that has a force of  "+sx+" N ";
    s3="   in "+sz+" m/s"+sq+" . ";
    x=y; // mass is answer...x in input answer...

    s4=x.toPrecision(3)+ " kg";
    break;

    case 0:
      //solve for volume...next....
    s2="________ Find the acceleration of  an object with a force of "+sx+" N ";
    s3="   that has a mass of "+sy+" kg.";

    x=z;
    s4=x.toPrecision(3)+ " m/s"+sq;
    //s2="x = "+y+" + "+z;
    break;
  }

}
//function

</script>

</head>

</html>
